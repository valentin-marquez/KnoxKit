name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel superseded runs on the same ref (e.g. force-push to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # Conventional Commits — PR only. Lints every commit in the PR range
  # against the canonical commitlint.config.js.
  # ---------------------------------------------------------------------
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout (full history for commit range)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint commit range
        run: >-
          bunx commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose

  # ---------------------------------------------------------------------
  # Biome lint/format check (single source of truth for JS/TS style).
  # ---------------------------------------------------------------------
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome CI check
        run: bunx @biomejs/biome ci .

  # ---------------------------------------------------------------------
  # Rust test suite. Windows ONLY — Windows is the only supported target
  # for this bootstrap (no ubuntu rust job by design).
  # ---------------------------------------------------------------------
  test-rust:
    name: Test (Rust, Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # ---------------------------------------------------------------------
  # Frontend tests. None exist yet — `bun test` exits 0 when no tests are
  # found, so this is a non-failing placeholder that activates as tests
  # are added.
  # ---------------------------------------------------------------------
  test-frontend:
    name: Test (Frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: bun test
        run: bun test

  # ---------------------------------------------------------------------
  # Full Tauri debug build (smoke test that the app compiles + bundles).
  # Windows ONLY.
  # ---------------------------------------------------------------------
  build:
    name: Build (Tauri, Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Tauri build (debug)
        run: bun run tauri build --debug
