name: Release

on:
  push:
    tags:
      - "v*"

# Only one release per tag should ever run.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------
  # Build Windows installers (MSI + NSIS) and publish a DRAFT GitHub
  # Release. Windows ONLY — no Linux/macOS artifacts in this bootstrap
  # (see docs/future.md).
  # ---------------------------------------------------------------------
  release:
    name: Build & draft release (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build & publish draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: "KnoxKit ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
