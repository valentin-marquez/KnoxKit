<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>KnoxKit</title>
    <style>
      /* Pre-paint background matches the dark token so there is no flash. */
      html {
        background: #212121;
      }
      html:not(.dark) {
        background: #f5f5f5;
      }
    </style>
    <script>
      // Apply persisted theme before first paint. KnoxKit is dark-first:
      // dark unless the user explicitly chose light.
      (() => {
        try {
          const stored = localStorage.getItem("knoxkit.theme");
          const root = document.documentElement;
          if (stored === "light") {
            root.classList.remove("dark");
          } else {
            root.classList.add("dark");
          }
        } catch {
          /* localStorage unavailable; theme-provider will reconcile */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
